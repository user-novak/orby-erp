<form
  [formGroup]="accountForm"
  (ngSubmit)="onSubmitForm()"
  class="mt-6 mx-auto max-w-6xl px-4 lg:px-8 grid grid-cols-1 lg:grid-cols-2 gap-x-6 gap-y-6"
>
  <div class="lg:col-span-2">
    <mat-form-field class="w-full">
      <mat-label>Nombre de la cuenta bancaria</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>
  </div>

  <div>
    <mat-form-field class="w-full" floatLabel="always">
      <mat-label>Monto</mat-label>
      <input matInput type="number" formControlName="amount" />
    </mat-form-field>
  </div>

  <div>
    <mat-form-field class="w-full" floatLabel="always">
      <mat-label>Número de cuenta</mat-label>
      <input matInput formControlName="account_number" />
    </mat-form-field>
  </div>

  <div class="lg:col-span-2">
    <mat-form-field class="w-full" floatLabel="always">
      <mat-label>Descripción</mat-label>
      <input matInput formControlName="description" />
    </mat-form-field>
  </div>

  <button type="button" matButton="tonal" (click)="onClearForm()">
    Limpiar
    <mat-icon>autorenew</mat-icon>
  </button>

  <button matButton="filled">
    {{ formMode() === 'edit' ? 'Editar cuenta' : 'Crear cuenta' }}
    <mat-icon>
      {{ formMode() === 'edit' ? 'edit' : 'add' }}
    </mat-icon>
  </button>
</form>

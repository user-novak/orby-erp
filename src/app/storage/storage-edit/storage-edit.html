<main class="module-main">
  <div class="w-full grid grid-cols-3 items-center">
    <div class="justify-self-start mx-8">
      <button (click)="goStorages()" mat-fab aria-label="Back button" class="cursor-pointer">
        <mat-icon>keyboard_backspace</mat-icon>
      </button>
    </div>

    <h2 class="text-lg sm:text-2xl font-black text-center">Editar Producto</h2>
  </div>

  @if (storage(); as storageData) {
    <app-storage-form
      [formMode]="formMode"
      [storage]="storageData"
      (formSubmit)="editStorage($event)"
    ></app-storage-form>
  }
</main>
